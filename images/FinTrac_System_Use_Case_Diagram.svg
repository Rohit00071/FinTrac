<svg width="900" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles -->
  <style>
    .actor-head { fill: white; stroke: black; stroke-width: 2; }
    .actor-body { stroke: black; stroke-width: 2; }
    .boundary { fill: white; stroke: black; stroke-width: 2; }
    .usecase { fill: white; stroke: black; stroke-width: 2; }
    .text { font-family: Arial, sans-serif; font-size: 14px; text-anchor: middle; }
    .label { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
    .arrow { stroke: black; stroke-width: 2; marker-end: url(#arrowhead); }
    .dashed-arrow { stroke: black; stroke-width: 1.5; stroke-dasharray: 5,5; marker-end: url(#arrowhead); }
    .stereotype { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; fill: black; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black" />
    </marker>
  </defs>

  <!-- System Boundary -->
  <rect x="250" y="50" width="450" height="700" class="boundary" />
  <text x="475" y="80" class="label">FinTrac Application</text>

  <!-- Actors -->
  
  <!-- Guest (Top Left) -->
  <g transform="translate(100, 150)">
    <circle cx="20" cy="20" r="20" class="actor-head" />
    <line x1="20" y1="40" x2="20" y2="100" class="actor-body" />
    <line x1="20" y1="50" x2="0" y2="80" class="actor-body" />
    <line x1="20" y1="50" x2="40" y2="80" class="actor-body" />
    <line x1="20" y1="100" x2="0" y2="140" class="actor-body" />
    <line x1="20" y1="100" x2="40" y2="140" class="actor-body" />
    <text x="20" y="160" class="text">Guest</text>
  </g>

  <!-- Registered User (Bottom Left) -->
  <g transform="translate(100, 500)">
    <circle cx="20" cy="20" r="20" class="actor-head" />
    <line x1="20" y1="40" x2="20" y2="100" class="actor-body" />
    <line x1="20" y1="50" x2="0" y2="80" class="actor-body" />
    <line x1="20" y1="50" x2="40" y2="80" class="actor-body" />
    <line x1="20" y1="100" x2="0" y2="140" class="actor-body" />
    <line x1="20" y1="100" x2="40" y2="140" class="actor-body" />
    <text x="20" y="160" class="text">Registered User</text>
  </g>

  <!-- AI System (Right) -->
  <g transform="translate(800, 400)">
    <circle cx="20" cy="20" r="20" class="actor-head" />
    <line x1="20" y1="40" x2="20" y2="100" class="actor-body" />
    <line x1="20" y1="50" x2="0" y2="80" class="actor-body" />
    <line x1="20" y1="50" x2="40" y2="80" class="actor-body" />
    <line x1="20" y1="100" x2="0" y2="140" class="actor-body" />
    <line x1="20" y1="100" x2="40" y2="140" class="actor-body" />
    <text x="20" y="160" class="text">AI System</text>
  </g>

  <!-- Use Cases -->

  <!-- Auth Use Cases -->
  <g transform="translate(475, 130)">
    <ellipse cx="0" cy="0" rx="100" ry="25" class="usecase" />
    <text x="0" y="5" class="text">Sign Up</text>
  </g>

  <g transform="translate(475, 200)">
    <ellipse cx="0" cy="0" rx="100" ry="25" class="usecase" />
    <text x="0" y="5" class="text">Login</text>
  </g>

  <!-- Core Features -->
  <g transform="translate(475, 300)">
    <ellipse cx="0" cy="0" rx="120" ry="25" class="usecase" />
    <text x="0" y="5" class="text">Manage Transactions</text>
  </g>

  <g transform="translate(475, 370)">
    <ellipse cx="0" cy="0" rx="120" ry="25" class="usecase" />
    <text x="0" y="5" class="text">Manage Budgets</text>
  </g>

  <g transform="translate(475, 440)">
    <ellipse cx="0" cy="0" rx="120" ry="25" class="usecase" />
    <text x="0" y="5" class="text">Manage Savings Goals</text>
  </g>

  <g transform="translate(475, 510)">
    <ellipse cx="0" cy="0" rx="120" ry="25" class="usecase" />
    <text x="0" y="5" class="text">View Financial Reports</text>
  </g>

  <!-- AI Features -->
  <g transform="translate(475, 580)">
    <ellipse cx="0" cy="0" rx="120" ry="25" class="usecase" />
    <text x="0" y="5" class="text">Get AI Investment Advice</text>
  </g>

  <g transform="translate(475, 650)">
    <ellipse cx="0" cy="0" rx="120" ry="25" class="usecase" />
    <text x="0" y="5" class="text">Get AI Spending Tips</text>
  </g>

  <g transform="translate(475, 720)">
    <ellipse cx="0" cy="0" rx="100" ry="25" class="usecase" />
    <text x="0" y="5" class="text">Logout</text>
  </g>

  <!-- Connections -->

  <!-- Guest Connections -->
  <line x1="140" y1="180" x2="375" y2="130" class="arrow" /> <!-- Guest to Sign Up -->
  <line x1="140" y1="190" x2="375" y2="200" class="arrow" /> <!-- Guest to Login -->

  <!-- Registered User Connections -->
  <line x1="140" y1="530" x2="355" y2="300" class="arrow" /> <!-- User to Transactions -->
  <line x1="140" y1="540" x2="355" y2="370" class="arrow" /> <!-- User to Budgets -->
  <line x1="140" y1="550" x2="355" y2="440" class="arrow" /> <!-- User to Goals -->
  <line x1="140" y1="560" x2="355" y2="510" class="arrow" /> <!-- User to Reports -->
  <line x1="140" y1="570" x2="355" y2="580" class="arrow" /> <!-- User to AI Inv -->
  <line x1="140" y1="580" x2="355" y2="650" class="arrow" /> <!-- User to AI Spend -->
  <line x1="140" y1="590" x2="375" y2="720" class="arrow" /> <!-- User to Logout -->

  <!-- AI System Connections -->
  <line x1="800" y1="450" x2="595" y2="580" class="arrow" /> <!-- AI to Inv Advice -->
  <line x1="800" y1="460" x2="595" y2="650" class="arrow" /> <!-- AI to Spend Tips -->

  <!-- <<requires>> Dependencies to Login -->
  <!-- Drawing dashed lines from features to Login -->
  <line x1="550" y1="280" x2="520" y2="225" class="dashed-arrow" />
  <text x="560" y="260" class="stereotype">&lt;&lt;requires&gt;&gt;</text>

  <line x1="560" y1="350" x2="530" y2="225" class="dashed-arrow" />
  
  <line x1="570" y1="420" x2="540" y2="225" class="dashed-arrow" />

</svg>
