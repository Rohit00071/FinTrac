<svg width="800" height="700" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles -->
  <style>
    .actor-head { fill: #e6e6fa; stroke: black; stroke-width: 1; }
    .actor-body { stroke: black; stroke-width: 1.5; }
    .lifeline { stroke: black; stroke-width: 1; stroke-dasharray: 5,5; }
    .object-box { fill: #e6e6fa; stroke: black; stroke-width: 1; }
    .text { font-family: Arial, sans-serif; font-size: 14px; text-anchor: middle; }
    .message-text { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; }
    .arrow { stroke: black; stroke-width: 1.5; marker-end: url(#arrowhead); }
    .dashed-arrow { stroke: black; stroke-width: 1.5; stroke-dasharray: 4,4; marker-end: url(#arrowhead); }
    .alt-box { fill: none; stroke: black; stroke-width: 1.5; }
    .alt-label { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: black; }
    .condition-label { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; fill: black; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black" />
    </marker>
  </defs>

  <!-- Lifelines -->
  <!-- Guest User -->
  <g transform="translate(100, 50)">
    <circle cx="20" cy="20" r="15" class="actor-head" />
    <line x1="20" y1="35" x2="20" y2="75" class="actor-body" />
    <line x1="20" y1="45" x2="0" y2="65" class="actor-body" />
    <line x1="20" y1="45" x2="40" y2="65" class="actor-body" />
    <line x1="20" y1="75" x2="0" y2="105" class="actor-body" />
    <line x1="20" y1="75" x2="40" y2="105" class="actor-body" />
    <text x="20" y="125" class="text">Guest User</text>
    <line x1="20" y1="130" x2="20" y2="650" class="lifeline" />
  </g>

  <!-- Sign Up Screen -->
  <g transform="translate(350, 80)">
    <rect x="-60" y="0" width="120" height="40" class="object-box" />
    <text x="0" y="25" class="text">Sign Up Screen</text>
    <line x1="0" y1="40" x2="0" y2="620" class="lifeline" />
  </g>

  <!-- AsyncStorage -->
  <g transform="translate(600, 80)">
    <rect x="-60" y="0" width="120" height="40" class="object-box" />
    <text x="0" y="25" class="text">AsyncStorage</text>
    <line x1="0" y1="40" x2="0" y2="620" class="lifeline" />
  </g>

  <!-- Messages -->
  
  <!-- 1. Open Page -->
  <line x1="120" y1="160" x2="350" y2="160" class="arrow" />
  <text x="235" y="155" class="message-text">1. Open Sign Up Screen</text>

  <!-- 2. Enter Details -->
  <line x1="120" y1="200" x2="350" y2="200" class="arrow" />
  <text x="235" y="195" class="message-text">2. Enter details (name, email, pass)</text>

  <!-- 3. Check Email -->
  <line x1="350" y1="240" x2="600" y2="240" class="arrow" />
  <text x="475" y="235" class="message-text">3. Check if email exists</text>

  <!-- 4. Return Status -->
  <line x1="600" y1="280" x2="350" y2="280" class="dashed-arrow" />
  <text x="475" y="275" class="message-text">4. Return status (exists/unique)</text>

  <!-- Alt Block -->
  <rect x="50" y="310" width="650" height="280" class="alt-box" />
  <path d="M 50 340 L 120 340 L 130 330 L 130 310" fill="none" stroke="black" stroke-width="1" />
  <text x="75" y="330" class="alt-label">alt</text>
  
  <!-- Condition: Email Unique -->
  <text x="180" y="330" class="condition-label">[Email Unique]</text>

  <!-- 5. Create Account -->
  <line x1="350" y1="360" x2="600" y2="360" class="arrow" />
  <text x="475" y="355" class="message-text">5. Create new account</text>

  <!-- 6. Save Confirmation -->
  <line x1="600" y1="400" x2="350" y2="400" class="dashed-arrow" />
  <text x="475" y="395" class="message-text">6. Save confirmation</text>

  <!-- 7. Show Success -->
  <line x1="350" y1="440" x2="120" y2="440" class="dashed-arrow" />
  <text x="235" y="435" class="message-text">7. Show "Account Created"</text>

  <!-- Divider -->
  <line x1="50" y1="480" x2="700" y2="480" stroke="black" stroke-width="1" stroke-dasharray="3,3" />

  <!-- Condition: Email Exists -->
  <text x="100" y="500" class="condition-label">[Email Exists]</text>

  <!-- Show Error -->
  <line x1="350" y1="540" x2="120" y2="540" class="dashed-arrow" />
  <text x="235" y="535" class="message-text">Show "Email already registered"</text>

  <!-- Bottom Actors (Optional, but in reference) -->
  <g transform="translate(100, 660)">
    <circle cx="20" cy="20" r="15" class="actor-head" />
    <line x1="20" y1="35" x2="20" y2="75" class="actor-body" />
    <line x1="20" y1="45" x2="0" y2="65" class="actor-body" />
    <line x1="20" y1="45" x2="40" y2="65" class="actor-body" />
    <text x="20" y="95" class="text">Guest User</text>
  </g>

  <g transform="translate(350, 640)">
    <rect x="-60" y="0" width="120" height="40" class="object-box" />
    <text x="0" y="25" class="text">Sign Up Screen</text>
  </g>

  <g transform="translate(600, 640)">
    <rect x="-60" y="0" width="120" height="40" class="object-box" />
    <text x="0" y="25" class="text">AsyncStorage</text>
  </g>

</svg>
