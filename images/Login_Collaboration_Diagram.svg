<svg width="900" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles -->
  <style>
    .object-box { fill: #f0f0f0; stroke: black; stroke-width: 1.5; }
    .text { font-family: Arial, sans-serif; font-size: 14px; text-anchor: middle; }
    .label { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; }
    .arrow { stroke: black; stroke-width: 1.5; marker-end: url(#arrowhead); }
    .line { stroke: black; stroke-width: 1.5; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black" />
    </marker>
  </defs>

  <!-- Objects -->
  
  <!-- User -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="100" height="50" class="object-box" />
    <text x="50" y="30" class="text">User</text>
  </g>

  <!-- Login Screen -->
  <g transform="translate(250, 150)">
    <rect x="0" y="0" width="120" height="50" class="object-box" />
    <text x="60" y="30" class="text">Login Screen</text>
  </g>

  <!-- Auth Controller -->
  <g transform="translate(470, 150)">
    <rect x="0" y="0" width="120" height="50" class="object-box" />
    <text x="60" y="30" class="text">Auth Controller</text>
  </g>

  <!-- AsyncStorage -->
  <g transform="translate(690, 150)">
    <rect x="0" y="0" width="120" height="50" class="object-box" />
    <text x="60" y="30" class="text">AsyncStorage</text>
  </g>

  <!-- Links -->
  <line x1="150" y1="175" x2="250" y2="175" class="line" />
  <line x1="370" y1="175" x2="470" y2="175" class="line" />
  <line x1="590" y1="175" x2="690" y2="175" class="line" />

  <!-- Messages -->

  <!-- 1. Enter credentials -->
  <text x="200" y="165" class="label">1. Enter credentials</text>
  <line x1="160" y1="170" x2="240" y2="170" class="arrow" />

  <!-- 8. Redirect/Error (Return) -->
  <text x="200" y="195" class="label">6. Redirect / Error</text>
  <line x1="240" y1="190" x2="160" y2="190" class="arrow" />

  <!-- 2. Send login request -->
  <text x="420" y="165" class="label">2. Send login request</text>
  <line x1="380" y1="170" x2="460" y2="170" class="arrow" />

  <!-- 7. Response -->
  <text x="420" y="195" class="label">5. Response (Success/Fail)</text>
  <line x1="460" y1="190" x2="380" y2="190" class="arrow" />

  <!-- 3. Verify credentials -->
  <text x="640" y="165" class="label">3. Verify credentials</text>
  <line x1="600" y1="170" x2="680" y2="170" class="arrow" />

  <!-- 4. Return result -->
  <text x="640" y="195" class="label">4. Return result</text>
  <line x1="680" y1="190" x2="600" y2="190" class="arrow" />

</svg>
