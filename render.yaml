databases:
  - name: fintrack-db
      plan: free

      services:
        - type: web
            name: fintrack-ai
                env: python
                    plan: free
                        rootDir: ai_service
                            buildCommand: pip install -r requirements.txt
                                startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
                                  - type: web
                                      name: fintrack-main
                                          env: node
                                              plan: free
                                                  buildCommand: npm install && npm run server:build && npm run expo:static:build
                                                      startCommand: npm run server:prod
                                                      
