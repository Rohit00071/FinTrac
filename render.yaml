databases:
- name: fintrack-db
plan: free
services:
- name: fintrack-ai
type: web
env: python
plan: free
  rootDir: ai_service
    buildCommand: pip install -r requirements.txt
      startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
      - name: fintrack-main
        type: web
          env: node
            plan: free
              buildCommand: npm install && npm run server:build && npm run expo:static:build
                startCommand: npm run server:prod
                
